name: brainfit
description: BrainFit - 脑力健身房 MVP (纯本地版)
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # 本地存储 - 核心依赖
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # 动画
  lottie: ^3.0.0
  flutter_animate: ^4.5.0
  
  # 图表
  fl_chart: ^0.66.0
  
  # 健康数据（可选，本地计算）
  # health: ^9.0.0  # 暂时注释，减少权限依赖
  
  # 音频
  just_audio: ^0.9.36
  audioplayers: ^5.2.1
  
  # 震动反馈
  vibration: ^1.8.4
  
  # UI组件
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  
  # 工具
  intl: ^0.19.0
  uuid: ^4.2.1
  crypto: ^3.0.3
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.2
  
  # 本地通知（替代 Firebase Messaging）
  flutter_local_notifications: ^16.3.0
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/
    - assets/fonts/
  
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.otf
        - asset: assets/fonts/NotoSansSC-Bold.otf
          weight: 700
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
